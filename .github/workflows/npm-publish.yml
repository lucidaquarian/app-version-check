name: Publish to npm

# Manual publish to npm — run it from the Actions tab (Run workflow).
#
# Why manual and not auto-on-release?
#   This npm account enforces 2FA on writes. A classic "Publish" token (or an
#   interactive login) triggers a one-time-password prompt in CI (npm error
#   EOTP) that a workflow cannot answer, so release-triggered publishing fails.
#   To publish from CI, set the NPM_TOKEN secret to an npm **Automation** token
#   (or a granular token with read-write for this package) — those bypass 2FA.
#
#   Once such a token is configured, you can re-enable auto-publish on release
#   by adding these triggers back under `on:`:
#     release:
#       types: [published]
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Verify NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add an npm Automation token in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # prepublishOnly re-runs lint + test as a final safety net.
      # --provenance is omitted because it requires a public repo (this is
      # private); the package is still published publicly via --access public.
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
