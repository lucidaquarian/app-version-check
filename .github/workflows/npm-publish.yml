name: Publish to npm

# Publishes the package to npm whenever a GitHub Release is published.
# Create a release (which creates the git tag) to trigger it, or run it
# manually from the Actions tab via workflow_dispatch.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # prepublishOnly re-runs lint + test as a final safety net.
      # Note: --provenance is intentionally omitted because it requires a
      # public source repository; this repo is private. The npm package is
      # still published publicly via --access public.
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
